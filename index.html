<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euro Ascendancy Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="loginWrapper">
        <h2>ALLIANCE PORTAL LOGIN</h2>
        <form id="loginForm" onsubmit="event.preventDefault(); return false;">
            <div class="form-group">
                <label>Select Your Codename</label>
                <select id="loginUser" required>
                    <option value="">-- Identify Yourself --</option>
                    <option value="kkoedb">kkoedb</option>
                    <option value="Ant Rose">Ant Rose</option>
                    <option value="The Notorious One">The Notorious One</option>
                    <option value="lowly poly">lowly poly</option>
                    <option value="pioneer9">pioneer9</option>
                    <option value="Icyz">Icyz</option>
                    <option value="vipeR.">vipeR.</option>
                    <option value="TheOrthodoxone">TheOrthodoxone</option>
                    <option value="Da0Y Khan">Da0Y Khan</option>
                    <option value="AlbertRivera">AlbertRivera</option>
                    <option value="Al Capone">Al Capone</option>
                    <option value="ReedyTurnip">ReedyTurnip</option>
                    <option value="kalikaka">kalikaka</option>
                    <option value="JohnCox93">JohnCox93</option>
                    <option value="WonderfulWand">WonderfulWand</option>
                    <option value="Stonehatch">Stonehatch</option>
                    <option value="Konan">Konan</option>
                    <option value="Rhysand">Rhysand</option>
                    <option value="Yuki Suou">Yuki Suou</option>
                    <option value="Gaby0">Gaby0</option>
                </select>
            </div>
            <div class="form-group">
                <label>Access Key / Password</label>
                <input type="password" id="loginPass" placeholder="••••••••" required>
            </div>
            <button type="submit" id="loginBtn">ACCESS DATABASE</button>
        </form>
    </div>

    <div class="container" id="appWorkspace" style="display: none; max-width: 500px;">
        <h2 id="workspaceTitle">COMMAND PORTAL</h2>
        
        <div style="display: flex; gap: 8px; margin-bottom: 25px;">
            <button class="nav-toggle-btn" id="btnWeapons" onclick="switchToTab('weaponsPane')" style="flex: 1; padding: 12px 6px; background: #202022; border: 1px solid var(--crimson); color: white; cursor: pointer; font-weight: bold; font-size: 0.8rem; border-radius: 4px;">WEAPONS</button>
            <button class="nav-toggle-btn" id="btnLedger" onclick="switchToTab('ledgerPane')" style="flex: 1; padding: 12px 6px; background: #202022; border: 1px solid transparent; color: #A8A8B3; cursor: pointer; font-weight: bold; font-size: 0.8rem; border-radius: 4px;">MY GOLD LOGS</button>
            <button class="nav-toggle-btn" id="adminTabBtn" onclick="switchToTab('adminPane')" style="flex: 1; padding: 12px 6px; background: #202022; border: 1px solid transparent; color: #A8A8B3; cursor: pointer; font-weight: bold; font-size: 0.8rem; border-radius: 4px; display: none;">FINANCE DESK</button>
        </div>

        <div id="weaponsPane" class="app-pane">
            <div style="margin-bottom: 25px; background: var(--bg-dark); padding: 15px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1);">
                <label style="color: var(--cream); margin-bottom: 10px; font-weight: bold;">Your Live Stockpile Inventory</label>
                <div id="liveWeaponsGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 180px; overflow-y: auto; font-size: 0.85rem; color: #E1E1E6; padding-right: 5px;">
                    <p style="color: #A8A8B3; grid-column: span 2; text-align: center;">Loading inventory metrics...</p>
                </div>
            </div>

            <form id="trackerForm" onsubmit="event.preventDefault(); return false;">
                <div class="form-group">
                    <label>Select Asset Type</label>
                    <select id="weaponSelect" required>
                        <option value="">-- Choose Weapon --</option>
                        <option value="ICBM">ICBM</option>
                        <option value="BRBM">BRBM</option>
                        <option value="SRBM">SRBM</option>
                        <option value="MRBM">MRBM</option>
                        <option value="IRBM">IRBM</option>
                        <option value="GHOST">GHOST</option>
                        <option value="M240">M240</option>
                        <option value="M16 Rifle">M16 Rifle</option>
                        <option value="Frigate">Frigate</option>
                        <option value="Submarine">Submarine</option>
                        <option value="SPG-9">SPG-9</option>
                        <option value="2S25">2S25</option>
                        <option value="Destroyer">Destroyer</option>
                        <option value="BM-21">BM-21</option>
                        <option value="T-90MS">T-90MS</option>
                        <option value="Abrams M1A2">Abrams M1A2</option>
                        <option value="Merkava">Merkava</option>
                        <option value="Striker 40">Striker 40</option>
                        <option value="Patrol Boat">Patrol Boat</option>
                        <option value="M41-DK1">M41-DK1</option>
                        <option value="Cruiser">Cruiser</option>
                        <option value="Challenger 2">Challenger 2</option>
                        <option value="F-22 Raptor">F-22 Raptor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Update Your Current Inventory Count</label>
                    <input type="number" id="quantityInput" min="0" placeholder="e.g. 500" required>
                </div>
                <button type="submit" id="submitBtn">DISPATCH DATA</button>
            </form>
        </div>

        <div id="ledgerPane" class="app-pane" style="display: none;">
            <div style="background: var(--bg-dark); padding: 15px; border-radius: 4px; max-height: 300px; overflow-y: auto; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.1);" id="historyLogBox">
                <p style="color: #A8A8B3; text-align: center;">No financial transactions found on record yet.</p>
            </div>
        </div>

        <div id="adminPane" class="app-pane" style="display: none;">
             <p style="color:white; text-align:center;">MoF Administration Systems Active.</p>
        </div>

        <button onclick="logout()" style="margin-top: 30px; background: none; border: none; color: #A8A8B3; text-decoration: underline; width: 100%; text-align: center; cursor: pointer; font-size: 0.8rem;">Securely Clear & Sign Out</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
